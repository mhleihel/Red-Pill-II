sinks:
  # Direct HTML output
  - id: php_echo
    description: "PHP echo statement"
    sink_type: html_echo
    output_context: html_body
    node_types: ["echo_statement"]

  - id: php_print
    description: "PHP print statement"
    sink_type: html_echo
    output_context: html_body
    node_types: ["print_intrinsic"]

  - id: php_short_echo
    description: "PHP short echo tag <?= ?>"
    sink_type: html_echo
    output_context: html_body
    node_types: ["php_tag"]  # handled specially: <?= ... ?>

  - id: php_printf
    description: "printf with user data"
    sink_type: html_echo
    output_context: html_body
    function_names: ["printf"]

  - id: php_fprintf
    description: "fprintf writing to output"
    sink_type: html_echo
    output_context: html_body
    function_names: ["fprintf"]

  # HTTP redirects (URL injection)
  - id: php_header_location
    description: "HTTP Location redirect header"
    sink_type: url_redirect
    output_context: url_full
    function_names: ["header"]
    argument_pattern: "Location:"

  # File writes (stored XSS potential)
  - id: php_file_put_contents
    description: "Write data to a file"
    sink_type: file_write
    output_context: file_system
    function_names: ["file_put_contents"]

  - id: php_fwrite
    description: "Write data to a file handle"
    sink_type: file_write
    output_context: file_system
    function_names: ["fwrite", "fputs"]

  # JSON responses (can be dangerous if embedded in JS)
  - id: php_json_encode_output
    description: "json_encode output that is echoed"
    sink_type: json_response
    output_context: js_string
    function_names: ["json_encode"]

  # Setting cookies (header injection)
  - id: php_setcookie
    description: "setcookie value parameter"
    sink_type: header_output
    output_context: header_value
    function_names: ["setcookie", "setrawcookie"]
