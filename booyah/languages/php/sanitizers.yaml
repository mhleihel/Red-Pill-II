sanitizers:
  # HTML encoding
  - function: "htmlspecialchars"
    category: html_encode
    covers_context: ["html_body", "html_attribute"]
    note: "html_attribute coverage requires ENT_QUOTES flag; without it only html_body is covered"
    requires_ent_quotes_for_attribute: true

  - function: "htmlentities"
    category: html_encode
    covers_context: ["html_body", "html_attribute"]
    requires_ent_quotes_for_attribute: true

  - function: "html_entity_decode"
    category: html_decode
    covers_context: []
    note: "This REMOVES encoding, not a sanitizer"

  - function: "strip_tags"
    category: strip_tags
    covers_context: ["html_body"]
    note: "Does NOT protect html_attribute context"

  - function: "nl2br"
    category: passthrough
    covers_context: []
    note: "Not a security function"

  # URL encoding
  - function: "urlencode"
    category: url_encode
    covers_context: ["url_param"]

  - function: "rawurlencode"
    category: url_encode
    covers_context: ["url_param"]

  - function: "urldecode"
    category: url_decode
    covers_context: []
    note: "Removes encoding, not a sanitizer"

  # JavaScript context
  - function: "json_encode"
    category: js_encode
    covers_context: ["js_string"]
    note: "Only safe when value used inside a quoted JS string. NOT safe in js_block context."

  # Integer/float casts — safe in all contexts
  - function: "intval"
    category: type_cast
    covers_context: ["html_body", "html_attribute", "js_string", "js_block", "url_param", "url_full"]

  - function: "floatval"
    category: type_cast
    covers_context: ["html_body", "html_attribute", "js_string", "js_block", "url_param", "url_full"]

  - function: "abs"
    category: type_cast
    covers_context: ["html_body", "html_attribute", "js_string", "js_block", "url_param", "url_full"]

  # filter_var — context depends on filter constant argument
  - function: "filter_var"
    category: conditional
    covers_context: []
    note: "Context depends on FILTER_* constant: FILTER_SANITIZE_SPECIAL_CHARS→html_encode, FILTER_SANITIZE_ENCODED→url_encode, FILTER_VALIDATE_INT→type_cast"
    filter_map:
      FILTER_SANITIZE_SPECIAL_CHARS: {category: html_encode, contexts: ["html_body", "html_attribute"]}
      FILTER_SANITIZE_ENCODED: {category: url_encode, contexts: ["url_param"]}
      FILTER_SANITIZE_URL: {category: url_encode, contexts: ["url_param", "url_full"]}
      FILTER_VALIDATE_INT: {category: type_cast, contexts: ["html_body", "html_attribute", "js_string", "js_block", "url_param"]}
      FILTER_VALIDATE_FLOAT: {category: type_cast, contexts: ["html_body", "html_attribute", "js_string", "js_block", "url_param"]}
      FILTER_VALIDATE_EMAIL: {category: type_cast, contexts: ["html_body"]}
      FILTER_VALIDATE_URL: {category: url_encode, contexts: ["url_param", "url_full"]}
      FILTER_SANITIZE_ADD_SLASHES: {category: js_encode, contexts: ["js_string"]}

  # WordPress sanitizers
  - function: "wp_kses"
    category: html_encode
    covers_context: ["html_body"]
    note: "Allows a subset of HTML; not safe for html_attribute"

  - function: "wp_kses_post"
    category: html_encode
    covers_context: ["html_body"]

  - function: "esc_html"
    category: html_encode
    covers_context: ["html_body"]

  - function: "esc_attr"
    category: html_encode
    covers_context: ["html_attribute"]
    note: "WordPress function specifically designed for attribute context"

  - function: "esc_url"
    category: url_encode
    covers_context: ["url_param", "url_full"]

  - function: "esc_js"
    category: js_encode
    covers_context: ["js_string"]

  - function: "esc_textarea"
    category: html_encode
    covers_context: ["html_body"]

  # Twig / Blade (for template-level analysis)
  - function: "e"
    category: html_encode
    covers_context: ["html_body", "html_attribute"]
    note: "Twig auto-escape function; Blade {{ }} uses this"

  # Symfony
  - function: "htmlspecialchars_decode"
    category: html_decode
    covers_context: []
    note: "Removes encoding, not a sanitizer"
