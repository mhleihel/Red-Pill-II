rules:
- id: red-pill-js-express-request-source
  message: Express request input source.
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: $REQ.query[$KEY]
    - pattern: $REQ.query.$KEY
    - pattern: $REQ.params[$KEY]
    - pattern: $REQ.params.$KEY
    - pattern: $REQ.body[$KEY]
    - pattern: $REQ.body.$KEY
    - pattern: $REQ.headers[$KEY]
    - pattern: $REQ.headers.$KEY
    - pattern: $REQ.cookies[$KEY]
    - pattern: $REQ.cookies.$KEY
    - pattern: $REQ.get($KEY)
    - pattern: $REQ.header($KEY)
    - pattern: req.query
    - pattern: req.params
    - pattern: req.body
    - pattern: req.headers
  - metavariable-regex:
      metavariable: $REQ
      regex: ^(req|request)$
  metadata:
    red_pill_kind: source
    source_kind: query|body|header|cookie
    category: request_input
    confidence: '0.65'
- id: red-pill-js-fetch-api-source
  message: Fetch / XHR response or URL param input source.
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'fetch($URL).then($RES => $RES.json())

        '
    - pattern: 'fetch($URL).then($RES => $RES.text())

        '
    - pattern: 'fetch($URL).then($RES => $RES.blob())

        '
    - pattern: 'await fetch($URL)

        '
    - pattern: $XHR.responseText
    - pattern: $XHR.responseXML
    - pattern: new URLSearchParams($LOC.search)
    - pattern: new URL($LOC.href)
    - pattern: new URL($LOC)
  - metavariable-regex:
      metavariable: $LOC
      regex: (^|\W)(location|window\.location)($|\W)
  metadata:
    red_pill_kind: source
    source_kind: async_fetch|url_parse
    category: third_party_or_async_input
    confidence: '0.50'
