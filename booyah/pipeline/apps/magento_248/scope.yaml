app_id: magento_248
app_name: "Magento 2.4.8-p4"
app_version: "2.4.8-p4"
language: php
framework: magento
repo_path: "/Users/mhleihel/Desktop/magento2-2.4.8-p4"

include_paths:
  - "app/code/"
  - "vendor/magento/"

exclude_paths:
  - "vendor/magento/framework/Test/"
  - "generated/"
  - "dev/tests/"

required_component_packs:
  - magento_framework_php
  - magento_cms_php
  - magento_catalog_php
  - magento_review_php
  - magento_checkout_php

entrypoints:
  http_routes: true
  rest_api: true
  graphql: true
  cli_commands: true
  queue_consumers: true
  cron_jobs: true
  webhooks: false
  rpc_grpc: false

actors:
  - id: anonymous
    description: "Unauthenticated frontend request"
  - id: authenticated
    description: "Logged-in customer"
  - id: "role:admin"
    description: "Full-access Magento admin"
  - id: "role:restricted_admin"
    description: "Scoped admin (sales/catalog/customers/marketing/content/reports/stores/system)"

crawl_scope:
  required: true
  authorization_scopes:
    - anonymous
    - authenticated
    - "role:admin"
    - "role:restricted_admin"
  channels:
    - frontend_web
    - adminhtml
    - webapi_rest
    - graphql
    - background_queue
    - cron
  coverage_rule: "every_in_scope_row_must_be_classified"
  out_of_scope_policy: "record_as_coverage_debt"

  # Explicitly declares which scope×channel pairs have been executed by a crawl script.
  # The coverage tool does NOT infer coverage from shared role labels (multiple channels
  # share the same role label; without a channel column in the trace store, coverage
  # must be asserted here, not inferred). Update this list after each crawl run.
  executed_pairs:
    - {scope: anonymous,           channel: frontend_web,   script: crawl_anon.php,     run_id: run-full-20260507}
    - {scope: anonymous,           channel: webapi_rest,    script: crawl_anon.php,     run_id: run-full-20260507}
    - {scope: authenticated,       channel: frontend_web,   script: crawl_customer.php, run_id: run-full-20260507}
    - {scope: authenticated,       channel: webapi_rest,    script: crawl_customer.php, run_id: run-full-20260507}
    - {scope: "role:admin",        channel: adminhtml,      script: crawl_admin.php,    run_id: run-full-20260507}
    - {scope: "role:admin",        channel: webapi_rest,    script: crawl_admin.php,    run_id: run-full-20260507}
    - {scope: "role:restricted_admin", channel: adminhtml,  script: crawl_admin.php,    run_id: run-full-20260507}
    - {scope: "role:restricted_admin", channel: webapi_rest, script: crawl_admin.php,   run_id: run-full-20260507}

  # Pairs declared as coverage debt — not executed, reason required.
  debt_pairs:
    - {scope: anonymous,           channel: graphql,           reason: "no GraphQL crawl script — endpoint reachable but untested"}
    - {scope: anonymous,           channel: background_queue,  reason: "queue consumers out-of-process; no channel instrumentation yet"}
    - {scope: anonymous,           channel: cron,              reason: "cron jobs out-of-process; no channel instrumentation yet"}
    - {scope: authenticated,       channel: graphql,           reason: "no authenticated GraphQL crawl script"}
    - {scope: authenticated,       channel: background_queue,  reason: "queue consumers out-of-process"}
    - {scope: authenticated,       channel: cron,              reason: "cron out-of-process"}
    - {scope: "role:admin",        channel: graphql,           reason: "admin GraphQL mutations not crawled"}
    - {scope: "role:admin",        channel: background_queue,  reason: "queue consumers out-of-process"}
    - {scope: "role:admin",        channel: cron,              reason: "cron out-of-process"}
    - {scope: "role:restricted_admin", channel: graphql,       reason: "not crawled"}
    - {scope: "role:restricted_admin", channel: background_queue, reason: "queue consumers out-of-process"}
    - {scope: "role:restricted_admin", channel: cron,          reason: "cron out-of-process"}

risk_tier_overrides:
  - pattern: "/admin/**"
    tier: CRITICAL
    reason: "Admin routes handle privileged operations; any auth gap is critical"
  - pattern: "/rest/V1/**"
    tier: HIGH
    reason: "REST API is publicly reachable and carries structured payloads"
  - pattern: "/graphql*"
    tier: HIGH
    reason: "GraphQL endpoint accepts arbitrary queries; pattern covers all /graphql/* operations"

production_traffic:
  available: true
  capture_tool: "booyah_tracer"
  sensitive_fields_policy: "fields_policy.yaml"
  # booyah_taint_map is written by Booyah_Tracer Magento module (instrumented-magento-php-1)
  # All values are stored as hashes; no raw PII in the trace DB.

coverage_targets:
  function_instrumentation_pct: 98
  critical_chokepoints_pct: 100
  route_coverage_pct: 80
  composed_joins_confirmed_pct: 80
  replay_success_rate_pct: 95

security_requirements:
  red_pill: true
  nospoon: true
  custom: []

adapters:
  route_extractor: "booyah.routes.magento_extractor"
  auth_extractor: "booyah.nospoon.scripts.nospoon_guard_extract"
  replay_adapter: "booyah.pipeline.adapters.magento_taint_replay"

database:
  host: "127.0.0.1"
  port: 3307
  user: "magento"
  password: "magento"
  name: "magento"
